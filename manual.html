<!DOCTYPE html>
<html>
<head>
    <title>Manual Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/manual">Manual Input</a>
    <a href="/about">About</a>
    <a href="/performance">Performance</a>
</div>

<div class="box">
    <h2>Manual Stock Prediction</h2>

    <form action="/manual_predict" method="POST">
        <input type="text" name="stock" placeholder="Stock Symbol (AAPL)" required>

        <input type="number" step="any" name="open" placeholder="Open Price" required>
        <input type="number" step="any" name="high" placeholder="High Price" required>
        <input type="number" step="any" name="low" placeholder="Low Price" required>
        <input type="number" step="any" name="close" placeholder="Close Price" required>
        <input type="number" step="any" name="volume" placeholder="Volume" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h3>{{ stock }} Prediction</h3>
        <p>Predicted Close Price: {{ prediction }}</p>
        <p>Prediction Date: {{ prediction_date }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
